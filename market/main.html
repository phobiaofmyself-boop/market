<!DOCTYPE html>

    <title>꼬리마켓</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif
        }
        header{
            background-color: black;
            color: white;
            padding: 15px 40px;
        }
        .logo{
            display: flex;
        }
        .nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* .menu{
            margin-left: 100px;
        } */
        .menu a{
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .hero{
            background: beige;
            padding: 60px;
            text-align: center;
            border-bottom: 1px solid#ddd;
        }
        .container{
            width: 1100px;
            margin: auto;
            padding: 40px 0;
        }
        .grid{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 20px;
        }
        .card{
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover{
            transform: translateY(-3px)
        }
        .card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-body{
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .btn{
            display: inline-block;
            padding: 8px 14px;
            background: #111;
            color: white;
            text-decoration: none;
            font-size: 13px;
            margin-top: auto;
            align-self: flex-end;
            border-radius: 4px;
        }
        .footer{
            margin-top: 60px;
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 30px;
            font-size: 15px;
        }
    </style>
</head>
